<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cloth Simulation - Verlet Integration</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        canvas { display: block; margin: 0 auto; background: #111; }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            color: #eee;
            font-family: sans-serif;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        #ui-toggle {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 101;
            padding: 5px 15px;
            cursor: pointer;
            background: #444;
            color: white;
            border: none;
            border-radius: 4px;
        }
        input[type=range] { width: 150px; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<canvas id="canvas" width="900" height="600"></canvas>
<button id="ui-toggle">Settings</button>
<div id="ui-container">
    <div>Wind Strength</div>
    <input type="range" id="windSlider" min="-1" max="1" step="0.01" value="0.1">
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const uiToggle = document.getElementById('ui-toggle');
const uiContainer = document.getElementById('ui-container');
const windSlider = document.getElementById('windSlider');

// Simulation Parameters
const cols = 30;
const rows = 20;
const spacingX = 25;
const spacingY = 25;
const gravity = { x: 0, y: 0.5 };
let windStrength = 0.1;

// State
let points = [];
let links = [];
let mouse = { x: 0, y: 0, isDown: false, target: null };

class Point {
    constructor(x, y, fixed = false) {
        this.x = x;
        this.y = y;
        this.ox = x; // oldX
        this.oy = y; // oldY
        this.fixed = fixed;
    }

    update(gx, gy, wx) {
        if (this.fixed) return;
        let vx = this.x - this.ox;
        let vy = this.y - this.oy;
        this.ox = this.x;
        this.oy = this.y;
        // Verlet Integration: next = current + velocity + acceleration * dt^2
        this.x += vx + gx + wx;
        this.y += vy + gy;
    }
}

class Link {
    constructor(p1, p2) {
        this.p1 = p1;
        this.p2 = p2;
        this.dist = Math.sqrt((p1.x - p2.x)**2 + (p1.y - p2.y)**2);
    }

    satisfy() {
        let dx = this.p2.x - this.p1.x;
        let dy = this.p2.y - this.p1.y;
        let d = Math.sqrt(dx * dx + dy * dy);
        if (d === 0) return;
        let diff = (this.dist - d) / d;

        if (!this.p1.fixed && !this.p2.fixed) {
            this.p1.x -= dx * diff * 0.5;
            this.p1.y -= dy * diff * 0.5;
            this.p2.x += dx * diff * 0.5;
            this.p2.y += dy * diff * 0.5;
        } else if (this.p1.fixed && !this.p2.fixed) {
            this.p2.x += dx * diff;
            this.p2.y += dy * diff;
        } else if (!this.p1.fixed && this.p2.fixed) {
            this.p1.x -= dx * diff;
            this.p1.y -= dy * diff;
        }
    }
}

function init() {
    points = [];
    links = [];
    const startX = (canvas.width - (cols - 1) * spacingX) / 2;
    const startY = 50;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let x = startX + c * spacingX;
            let y = startY + r * spacingY;
            // Top row is fixed
            let isFixed = (r === 0);
            points.push(new Point(x, y, isFixed));
        }
    }

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            let idx = r * cols + c;
            // Horizontal link
            if (c < cols - 1) {
                links.push(new Link(points[idx], points[idx + 1]));
            }
            // Vertical link
            if (r < rows - 1) {
                links.push(new Link(points[idx], points[idx + cols]));
            }
        }
    }
}

function update() {
    windStrength = parseFloat(windSlider.value);

    // 1. Verlet Integration
    for (let p of points) {
        p.update(gravity.x, gravity.y, windStrength);
    }

    // 2. Distance Constraints (5 iterations)
    for (let i = 0; i < 5; i++) {
        for (let link of links) {
            link.satisfy();
        }
    }

    // Mouse interaction handling
    if (mouse.isDown && mouse.target) {
        mouse.target.x = mouse.x;
        mouse.target.y = mouse.y;
        mouse.target.ox = mouse.x;
        mouse.target.oy = mouse.y;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;

    // Draw links
    ctx.beginPath();
    for (let link of links) {
        ctx.moveTo(link.p1.x, link.p1.y);
        ctx.lineTo(link.p2.x, link.p2.y);
    }
    ctx.stroke();

    // Draw points (optional, but helps visibility)
    ctx.fillStyle = '#fff';
    for (let p of points) {
        if (p.fixed) ctx.fillRect(p.x - 1, p.y - 1, 3, 3);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Event Listeners
canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
    mouse.isDown = true;

    // Find nearest point
    let minDist = 50; // radius for selection
    for (let p of points) {
        let dx = p.x - mouse.x;
        let dy = p.y - mouse.y;
        let d = Math.sqrt(dx * dx + dy * dy);
        if (d < minDist) {
            minDist = d;
            mouse.target = p;
        }
    }
});

window.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

window.addEventListener('mouseup', () => {
    mouse.isDown = false;
    mouse.target = null;
});

uiToggle.addEventListener('click', () => {
    const isVisible = uiContainer.style.display === 'block';
    uiContainer.style.display = isVisible ? 'none' : 'block';
});

// Start
init();
loop();

</script>
</body>
</html>
