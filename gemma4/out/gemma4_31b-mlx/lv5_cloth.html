<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cloth Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; }
        canvas { display: block; margin: 0 auto; background: #111; cursor: crosshair; }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-family: sans-serif;
            user-select: none;
        }
        #ui-toggle {
            cursor: pointer;
            background: #444;
            color: white;
            border: none;
            padding: 5px 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .control-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; }
    </style>
</head>
<body>

<canvas id="canvas" width="900" height="600"></canvas>

<div id="ui-container">
    <button id="ui-toggle">Toggle UI</button>
    <div id="controls">
        <div class="control-group">
            <label for="wind-slider">Wind Strength</label>
            <input type="range" id="wind-slider" min="-1.0" max="1.0" step="0.01" value="0">
        </div>
    </div>
</div>

<script>
(function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const windSlider = document.getElementById('wind-slider');
    const uiToggle = document.getElementById('ui-toggle');
    const controls = document.getElementById('controls');

    // Simulation Parameters
    const COLS = 30;
    const ROWS = 20;
    const SPACING = 15;
    const ITERATIONS = 5;
    const GRAVITY = 0.2;
    const FRICTION = 0.99;

    let windStrength = 0;
    let points = [];
    let constraints = [];
    let mousePoint = null;
    let isDragging = false;

    class Point {
        constructor(x, y, fixed = false) {
            this.x = x;
            this.y = y;
            this.px = x;
            this.py = y;
            this.fixed = fixed;
        }

        update() {
            if (this.fixed) return;

            const vx = (this.x - this.px) * FRICTION;
            const vy = (this.y - this.py) * FRICTION;

            this.px = this.x;
            this.py = this.y;

            this.x += vx + windStrength;
            this.y += vy + GRAVITY;
        }
    }

    class Constraint {
        constructor(p1, p2) {
            this.p1 = p1;
            this.p2 = p2;
            this.dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
        }

        solve() {
            const dx = this.p2.x - this.p1.x;
            const dy = this.p2.y - this.p1.y;
            const currentDist = Math.hypot(dx, dy);
            const diff = (this.dist - currentDist) / currentDist * 0.5;

            const offsetX = dx * diff;
            const offsetY = dy * diff;

            if (!this.p1.fixed) {
                this.p1.x -= offsetX;
                this.p1.y -= offsetY;
            }
            if (!this.p2.fixed) {
                this.p2.x += offsetX;
                this.p2.y += offsetY;
            }
        }
    }

    function init() {
        const startX = (canvas.width - (COLS - 1) * SPACING) / 2;
        const startY = 50;

        for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
                const fixed = (y === 0);
                points.push(new Point(startX + x * SPACING, startY + y * SPACING, fixed));
            }
        }

        for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
                if (x < COLS - 1) {
                    constraints.push(new Constraint(points[y * COLS + x], points[y * COLS + x + 1]));
                }
                if (y < ROWS - 1) {
                    constraints.push(new Constraint(points[y * COLS + x], points[(y + 1) * COLS + x]));
                }
            }
        }
    }

    function update() {
        points.forEach(p => p.update());

        for (let i = 0; i < ITERATIONS; i++) {
            constraints.forEach(c => c.solve());
        }

        if (isDragging && mousePoint) {
            mousePoint.x = currentMouseX;
            mousePoint.y = currentMouseY;
        }
    }

    function draw() {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = 1;
        ctx.beginPath();
        constraints.forEach(c => {
            ctx.moveTo(c.p1.x, c.p1.y);
            ctx.lineTo(c.p2.x, c.p2.y);
        });
        ctx.stroke();
    }

    let currentMouseX = 0;
    let currentMouseY = 0;

    canvas.addEventListener('mousedown', (e) => {
        const rect = canvas.getBoundingClientRect();
        currentMouseX = e.clientX - rect.left;
        currentMouseY = e.clientY - rect.top;

        let minDist = Infinity;
        points.forEach(p => {
            const d = Math.hypot(p.x - currentMouseX, p.y - currentMouseY);
            if (d < minDist) {
                minDist = d;
                mousePoint = p;
            }
        });

        if (minDist < 20) isDragging = true;
    });

    window.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        currentMouseX = e.clientX - rect.left;
        currentMouseY = e.clientY - rect.top;
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        mousePoint = null;
    });

    windSlider.addEventListener('input', (e) => {
        windStrength = parseFloat(e.target.value);
    });

    uiToggle.addEventListener('click', () => {
        controls.style.display = controls.style.display === 'none' ? 'block' : 'none';
    });

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    init();
    loop();
})();
</script>
</body>
</html>
