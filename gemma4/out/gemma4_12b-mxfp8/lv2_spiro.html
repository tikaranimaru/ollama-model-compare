<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Hypotrochoid Drawing</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: #111;
            border: 1px solid #333;
        }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(40, 40, 40, 0.8);
            padding: 15px;
            border-radius: 8px;
            color: white;
            font-family: sans-serif;
            border: 1px solid #555;
            transition: opacity 0.3s;
        }
        #ui-container.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        select, button {
            padding: 5px;
            cursor: pointer;
        }
        #toggle-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 10px;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<canvas id="canvas" width="900" height="600"></canvas>

<button id="toggle-btn">Toggle UI</button>

<div id="ui-container">
    <div class="controls">
        <label for="preset-select">Pattern Preset:</label>
        <select id="preset-select">
            <option value="1">Preset 1 (r=55, d=80)</option>
            <option value="2">Preset 2 (r=44, d=110)</option>
            <option value="3">Preset 3 (r=88, d=50)</option>
        </select>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const uiContainer = document.getElementById('ui-container');
    const toggleBtn = document.getElementById('toggle-btn');
    const presetSelect = document.getElementById('preset-select');

    // Constants
    const R = 220;
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const lineWidth = 2;

    // State
    let r = 55;
    let d = 80;
    let theta = 0;
    let isDrawing = true;
    let lastX = null;
    let lastY = null;
    let startX = null;
    let startY = null;

    const presets = {
        "1": { r: 55, d: 80 },
        "2": { r: 44, d: 110 },
        "3": { r: 88, d: 50 }
    };

    function init() {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        resetDrawing();
    }

    function resetDrawing() {
        const p = presets[presetSelect.value];
        r = p.r;
        d = p.d;
        theta = 0;
        isDrawing = true;
        lastX = null;
        lastY = null;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'white';
        ctx.lineWidth = lineWidth;
        ctx.lineCap = 'round';
    }

    function draw() {
        if (!isDrawing) return;

        // Hypotrochoid equations:
        // x = (R-r)cos(theta) + d*cos((R-r)/r * theta)
        // y = (R-r)sin(theta) - d*sin((R-r)/r * theta)
        
        const factor = (R - r) / r;
        const currentX = centerX + (R - r) * Math.cos(theta) + d * Math.cos(factor * theta);
        const currentY = centerY + (R - r) * Math.sin(theta) - d * Math.sin(factor * theta);

        if (lastX !== null) {
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(currentX, currentY);
            ctx.stroke();
        } else {
            startX = currentX;
            startY = currentY;
        }

        lastX = currentX;
        lastY = currentY;

        // Increment theta
        theta += 0.02;

        // Check if closed (distance to start point)
        const dist = Math.sqrt(Math.pow(currentX - startX, 2) + Math.pow(currentY - startY, 2));
        if (dist < 1 && theta > 0.5) {
            isDrawing = false;
        }

        requestAnimationFrame(draw);
    }

    // UI Events
    toggleBtn.addEventListener('click', () => {
        uiContainer.classList.toggle('hidden');
    });

    presetSelect.addEventListener('change', () => {
        resetDrawing();
        requestAnimationFrame(draw);
    });

    // Start
    init();
    requestAnimationFrame(draw);
</script>

</body>
</html>
